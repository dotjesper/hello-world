name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the details below to help investigate the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the issue you encountered.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run the script '...'
        2. With parameters '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
      placeholder: Describe the expected outcome.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
      placeholder: Describe what happened instead.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: The operating system where the issue occurred.
      placeholder: "e.g., Windows 11 24H2"
    validations:
      required: false
  - type: input
    id: powershell
    attributes:
      label: PowerShell version
      description: Output of `$PSVersionTable.PSVersion`.
      placeholder: "e.g., 5.1.26100.2161"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or log output related to the issue.
      placeholder: Add any other details here.
    validations:
      required: false
